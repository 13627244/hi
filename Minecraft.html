<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>我的世界 · 真实比例版</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Microsoft YaHei', sans-serif;
            color: white;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            opacity: 0.8;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            pointer-events: auto;
        }
        .block-slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
        }
        .block-slot.selected {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startScreen h1 {
            font-size: 60px;
            margin-bottom: 40px;
            color: #0f0;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            letter-spacing: 3px;
        }
        #startBtn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 16px 48px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn:hover {
            background: #00ff00;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ff00;
        }
        #tip {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>我的世界 · 真实比例</h1>
        <button id="startBtn">开始游戏</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="crosshair">+</div>
        <div id="hud">
            <div class="block-slot selected" data-type="grass">🟩</div>
            <div class="block-slot" data-type="dirt">🟫</div>
            <div class="block-slot" data-type="stone">⬜</div>
            <div class="block-slot" data-type="wood">🪵</div>
            <div class="block-slot" data-type="leaves">🍃</div>
        </div>
        <div id="tip">点击屏幕锁定鼠标 | WASD 移动 | 鼠标左右键 放置/破坏</div>
    </div>

    <!-- 使用稳定版本的 Three.js -->
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script>
        // =============== 游戏配置 ===============
        const WORLD_SIZE = 64; // 64x64 地图（更小但够用）
        const PLAYER_HEIGHT = 1.8; // 真实玩家身高（Minecraft 中是 1.8 格）
        const GRAVITY = 30;
        const MOVE_SPEED = 5;
        const JUMP_FORCE = 10;

        // 方块类型（真实 Minecraft 色值）
        const BLOCK_TYPES = {
            grass: { color: 0x7CC450, name: "草方块" },
            dirt:  { color: 0x986643, name: "泥土" },
            stone: { color: 0x8F8F8F, name: "石头" },
            wood:  { color: 0xBD9D6B, name: "木头" },
            leaves:{ color: 0x6ABE46, name: "树叶" }
        };

        // =============== 游戏状态 ===============
        let gameState = {
            world: new Map(), // key: "x,y,z", value: block object
            selectedBlock: 'grass',
            velocity: new THREE.Vector3(),
            isJumping: false,
            keys: { w: false, a: false, s: false, d: false, space: false, shift: false }
        };

        // =============== Three.js 初始化 ===============
        let scene, camera, renderer;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let clock = new THREE.Clock();
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        // 启动游戏
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            init();
            animate();
        });

        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.01);

            // 相机（设置在真实玩家眼睛高度）
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, PLAYER_HEIGHT, 0); // 眼睛高度 = 1.8

            // 渲染器
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('gameCanvas'),
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // 光照
            const ambient = new THREE.AmbientLight(0x606060);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(20, 30, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);

            // 第一人称控制器（手动实现）
            const blocker = document.getElementById('startScreen');
            const instructions = document.getElementById('tip');

            const pitchObject = new THREE.Object3D();
            pitchObject.add(camera);

            const yawObject = new THREE.Object3D();
            yawObject.position.y = PLAYER_HEIGHT; // 玩家脚部位置
            yawObject.add(pitchObject);

            scene.add(yawObject);

            const onMouseMove = (event) => {
                if (!document.pointerLockElement) return;
                const movementX = event.movementX || 0;
                const movementY = event.movementY || 0;
                yawObject.rotation.y -= movementX * 0.002;
                pitchObject.rotation.x -= movementY * 0.002;
                pitchObject.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitchObject.rotation.x));
            };

            const onClick = () => {
                if (document.pointerLockElement === renderer.domElement) return;
                renderer.domElement.requestPointerLock();
            };

            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('click', onClick, false);

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === renderer.domElement) {
                    blocker.style.display = 'none';
                    instructions.style.display = 'none';
                } else {
                    blocker.style.display = 'flex';
                    instructions.style.display = 'block';
                }
            }, false);

            // 生成地形
            generateWorld();

            // 事件监听
            setupEvents();

            // 存储控制器对象
            window.yawObject = yawObject;
            window.pitchObject = pitchObject;
        }

        // =============== 生成世界 ===============
        function generateWorld() {
            // 创建 64x64 地形
            for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
                for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
                    // 基础高度
                    let height = 3 + Math.floor(Math.sin(x * 0.15) * Math.cos(z * 0.15) * 2);
                    
                    // 边缘降低
                    const distFromCenter = Math.sqrt(x*x + z*z);
                    if (distFromCenter > WORLD_SIZE/4) {
                        height = Math.max(0, height - Math.floor((distFromCenter - WORLD_SIZE/4) / 5));
                    }

                    // 放置方块
                    for (let y = 0; y <= height; y++) {
                        let type = 'stone';
                        if (y === height) type = 'grass';
                        else if (y >= height - 1) type = 'dirt';
                        
                        addBlock(x, y, z, type);
                    }

                    // 随机生成树（稀疏一些）
                    if (height > 2 && Math.random() < 0.02) {
                        generateTree(x, height + 1, z);
                    }
                }
            }
        }

        function generateTree(x, y, z) {
            // 树干（3格高）
            addBlock(x, y, z, 'wood');
            addBlock(x, y+1, z, 'wood');
            addBlock(x, y+2, z, 'wood');
            
            // 树叶（紧凑型）
            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    addBlock(x + dx, y + 2, z + dz, 'leaves');
                    if (Math.abs(dx) + Math.abs(dz) <= 1) {
                        addBlock(x + dx, y + 3, z + dz, 'leaves');
                    }
                }
            }
        }

        // =============== 方块操作 ===============
        function addBlock(x, y, z, type) {
            const key = `${x},${y},${z}`;
            if (gameState.world.has(key)) return;

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshLambertMaterial({ 
                color: BLOCK_TYPES[type].color,
                flatShading: true
            });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, y, z);
            block.castShadow = true;
            block.receiveShadow = true;
            block.userData = { x, y, z, type };

            scene.add(block);
            gameState.world.set(key, block);
        }

        function removeBlock(block) {
            const { x, y, z } = block.userData;
            const key = `${x},${y},${z}`;
            scene.remove(block);
            gameState.world.delete(key);
        }

        // =============== 事件处理 ===============
        function setupEvents() {
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space':
                        if (canJump) {
                            gameState.velocity.y = JUMP_FORCE;
                            canJump = false;
                        }
                        break;
                    case 'Digit1': selectBlock('grass'); break;
                    case 'Digit2': selectBlock('dirt'); break;
                    case 'Digit3': selectBlock('stone'); break;
                    case 'Digit4': selectBlock('wood'); break;
                    case 'Digit5': selectBlock('leaves'); break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown, false);
            document.addEventListener('keyup', onKeyUp, false);

            const onMouseDown = (event) => {
                if (document.pointerLockElement !== renderer.domElement) return;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(Array.from(gameState.world.values()));
                
                if (intersects.length > 0) {
                    const block = intersects[0].object;
                    
                    if (event.button === 0) { // 左键：破坏
                        removeBlock(block);
                    } else if (event.button === 2) { // 右键：放置
                        const normal = intersects[0].face.normal;
                        const pos = {
                            x: Math.floor(block.position.x + normal.x),
                            y: Math.floor(block.position.y + normal.y),
                            z: Math.floor(block.position.z + normal.z)
                        };
                        
                        // 防止在玩家位置放置（使用真实玩家高度检测）
                        const playerPos = window.yawObject.position;
                        const dist = Math.sqrt(
                            Math.pow(pos.x - playerPos.x, 2) +
                            Math.pow(pos.y - (playerPos.y - PLAYER_HEIGHT/2), 2) + // 检测身体中心
                            Math.pow(pos.z - playerPos.z, 2)
                        );
                        if (dist > 1.5) {
                            addBlock(pos.x, pos.y, pos.z, gameState.selectedBlock);
                        }
                    }
                }
            };

            document.addEventListener('mousedown', onMouseDown, false);
            document.addEventListener('contextmenu', (e) => e.preventDefault(), false);

            document.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.querySelectorAll('.block-slot').forEach(slot => {
                slot.addEventListener('click', () => {
                    selectBlock(slot.dataset.type);
                });
            });
        }

        function selectBlock(type) {
            gameState.selectedBlock = type;
            document.querySelectorAll('.block-slot').forEach(slot => {
                slot.classList.toggle('selected', slot.dataset.type === type);
            });
        }

        // =============== 游戏循环 ===============
        function updatePlayer(delta) {
            if (document.pointerLockElement !== renderer.domElement) return;

            const velocity = gameState.velocity;
            velocity.y -= GRAVITY * delta;

            // 获取移动方向（基于视角）
            const direction = new THREE.Vector3(0, 0, 0);
            if (moveForward) direction.z -= 1;
            if (moveBackward) direction.z += 1;
            if (moveLeft) direction.x -= 1;
            if (moveRight) direction.x += 1;

            if (direction.length() > 0) {
                direction.normalize();
                const rotatedDirection = direction.clone();
                rotatedDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), window.yawObject.rotation.y);
                rotatedDirection.y = 0;
                rotatedDirection.normalize();

                const speed = MOVE_SPEED;
                velocity.x = rotatedDirection.x * speed;
                velocity.z = rotatedDirection.z * speed;
            } else {
                velocity.x = 0;
                velocity.z = 0;
            }

            // 应用移动
            window.yawObject.position.x += velocity.x * delta;
            window.yawObject.position.y += velocity.y * delta;
            window.yawObject.position.z += velocity.z * delta;

            // 地面碰撞（脚部高度 = 0）
            if (window.yawObject.position.y < PLAYER_HEIGHT) {
                window.yawObject.position.y = PLAYER_HEIGHT;
                velocity.y = 0;
                canJump = true;
            } else {
                canJump = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            updatePlayer(delta);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
